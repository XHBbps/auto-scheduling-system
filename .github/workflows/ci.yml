name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-check:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install .[dev]

      - name: Syntax check
        run: |
          python -c "
          import ast, os, sys
          errors = []
          for dirpath, dirnames, filenames in os.walk('app'):
              dirnames[:] = [d for d in dirnames if d != '__pycache__']
              for fn in filenames:
                  if fn.endswith('.py'):
                      fpath = os.path.join(dirpath, fn)
                      try:
                          with open(fpath, 'r', encoding='utf-8-sig') as f:
                              ast.parse(f.read())
                      except SyntaxError as e:
                          errors.append(f'{fpath}: {e}')
          if errors:
              for e in errors: print(e)
              sys.exit(1)
          print(f'All Python files parse OK')
          "

      - name: Run tests
        run: pytest --tb=short --cov=app --cov-report=term-missing -q

  frontend-check:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx vue-tsc -b

      - name: Run tests
        run: npm test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t auto-scheduling-backend ./services/api

      - name: Build frontend image
        run: docker build -t auto-scheduling-frontend ./apps/web
